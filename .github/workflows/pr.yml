name: Publish Docker image for PR

on:
  pull_request:
    branches:
      - "**"

jobs:
  apache:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta-apache
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/trajano/nextcloud
          tags: |
            type=pep440,pattern=apache-{{version}}
            type=pep440,pattern={{version}}
            

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: 31/apache
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-apache.outputs.tags }}
          labels: ${{ steps.meta-apache.outputs.labels }}
  fpm:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta-apache
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/trajano/nextcloud
          tags: |
            type=pep440,pattern=fpm-{{version}}
            type=pep440,pattern={{version}}
            

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: 31/fpm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-apache.outputs.tags }}
          labels: ${{ steps.meta-apache.outputs.labels }}